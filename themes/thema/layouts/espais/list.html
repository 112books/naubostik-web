{{ define "main" }}
<div class="page-header">
  <h1>Espais</h1>
  <p class="lead">Espais disponibles per a activitats culturals</p>
</div>

<ul class="post-list">
  {{ range .Paginator.Pages }}
  <li class="post-card">
    <article>
      <h3><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
      <p class="post-excerpt">{{ .Summary }}</p>
    </article>
  </li>
  {{ end }}
</ul>
{{ end }}
