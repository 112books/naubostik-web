{{ define "main" }}
<div class="page-header">
  <h1>Activitats</h1>
  <p class="lead">Tallers, cursos, projeccions i activitats obertes a tothom</p>
</div>

<ul class="post-list">
  {{ range .Paginator.Pages }}
  <li class="post-card">
    <article>
      <h3><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
      <p class="post-meta">{{ .Date.Format "02/01/2006" }}</p>
      <p class="post-excerpt">{{ .Summary }}</p>
    </article>
  </li>
  {{ end }}
</ul>

{{ template "_internal/pagination.html" . }}
{{ end }}
