{{ define "main" }}
<div class="page-header">
  <h1>{{ .Title }}</h1>
</div>
<ul class="post-list">
  {{ range .Paginator.Pages }}
  <li class="post-card">
    <article>
      <h3><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
      <p class="post-excerpt">{{ .Summary }}</p>
    </article>
  </li>
  {{ end }}
</ul>
{{ template "_internal/pagination.html" . }}
{{ end }}
